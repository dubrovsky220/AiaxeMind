services:
  postgres:
    image: postgres:16-alpine
    container_name: aiaxemind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    build:
      context: ./services/qdrant
      dockerfile: Dockerfile
    container_name: aiaxemind-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  embedding-service:
    build:
      context: ./services/embedding
      dockerfile: Dockerfile
    container_name: aiaxemind-embedding
    ports:
      - "${EMBEDDING_SERVICE_PORT:-8001}:8001"
    volumes:
      - embedding_models:/root/.cache/huggingface
      - ./services/embedding/app.py:/app/app.py
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL}
      PORT: 8001
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiaxemind-api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh
      - ./data:/app/data
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QDRANT_URL: http://qdrant:${QDRANT_PORT:-6333}
      EMBEDDING_SERVICE_URL: http://embedding-service:${EMBEDDING_SERVICE_PORT:-8001}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      API_HOST: ${API_HOST}
      API_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: /app/docker-entrypoint.sh

volumes:
  postgres_data:
  qdrant_storage:
  embedding_models:
